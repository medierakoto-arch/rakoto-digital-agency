<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanafatra Tolotra Graphic Design | Rakoto Digital Solutions</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://pl29456587.effectivecpmnetwork.com/2f/a8/6c/2fa86c529e3130ffd14b6752f9b2d2e.js"></script>
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; color: #333; margin: 0; }
        .form-container { max-width: 600px; margin: 60px auto; background: #fff; padding: 40px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 6px solid #ff5722; }
        h2 { font-family: 'Montserrat', sans-serif; color: #1e3c72; font-size: 26px; margin-bottom: 10px; text-align: center; }
        p.subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 30px; }
        .form-group { margin-bottom: 22px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #4a5568; font-size: 14px; }
        input[type="text"], input[type="email"], select, textarea { width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; box-sizing: border-box; font-family: inherit; transition: all 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: #ff5722; outline: none; box-shadow: 0 0 0 3px rgba(255, 87, 34, 0.15); }
        .submit-btn { width: 100%; background: #ff5722; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: background 0.3s; margin-top: 10px; }
        .submit-btn:hover { background: #e64a19; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 14px; }
        .back-link:hover { color: #ff5722; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Fandaharam-potoana sy Kaomandy</h2>
        <p class="subtitle">Fenoy ireto pitsopitsony ireto mba hanomborana ny asa famoronana avy hatrany.</p>
        
        <form id="designForm" onsubmit="sendOrder(event)">
            <div class="form-group">
                <label for="name">Anaranao na Orinasanao *</label>
                <input type="text" id="name" required placeholder="Ohatra: Big Bazar">
            </div>

            <div class="form-group">
                <label for="email">Adiresy Email *</label>
                <input type="email" id="idEmail" required placeholder="ohatra@gmail.com">
            </div>

            <div class="form-group">
                <label for="service">Inona ilay tolotra ilainao? *</label>
                <select id="service" required>
                    <option value="">-- Safidio eto --</option>
                    <option value="Logo unique">Identity & Logo</option>
                    <option value="Etikety sy Fonosana">Etikety sy Fonosana (Labels)</option>
                    <option value="Afisy Fampiroboroboana">Afisy Fampiroboroboana (A4 / Facebook)</option>
                    <option value="Pack complet">Tolotra feno (Pack Complet)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="details">Inona ny pitsopitsony momba ilay asa? (Loko tiana, soratra hapetraka...) *</label>
                <textarea id="details" rows="5" required placeholder="Soraty eto daholo ny hevitrao rehetra..."></textarea>
            </div>

            <button type="submit" class="submit-btn">Handefa ny kaomandy</button>
        </form>
        
        <a href="design.html" class="back-link">&larr; Hiverina amin'ny pejy teo aloha</a>
    </div>

    <script>
        function sendOrder(event) {
            event.preventDefault();
            
            // Maka ny tsanganana rehetra avy amin'ny form
            var name = document.getElementById('name').value;
            var email = document.getElementById('idEmail').value;
            var service = document.getElementById('service').value;
            var details = document.getElementById('details').value;
            
            // Mamorona hafatra mavesatra handeha amin'ny Email
            var subject = encodeURIComponent("Kaomandy Design vaovao avy amin'i " + name);
            var body = encodeURIComponent(
                "Miarahaba anao,\n\n" +
                "Misy kaomandy vaovao tonga ao amin'ny site-nao:\n\n" +
                "- Orinasa/Anarana: " + name + "\n" +
                "- Email: " + email + "\n" +
                "- Tolotra ilaina: " + service + "\n" +
                "- Pitsopitsony: " + details + "\n\n" +
                "Mankasitraka!"
            );
            
            // Mandefa ny olona any amin'ny mailaka matihanina-nao avy hatrany
            window.location.href = "mailto:christian.rakoto.pro@gmail.com?subject=" + subject + "&body=" + body;
        }
    </script>

    <script src="https://alwingulla.com/act/files/tag.min.js?z=8848496" data-cfasync="false" async></script>
</body>
</html>
