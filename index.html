<!DOCTYPE html>
<html lang="mg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rakoto Digital Agency</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    /* CSS */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: #f8fafc;
      color: #334155;
      overflow-x: hidden;
      line-height: 1.8;
    }

    header {
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 999;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .header-container {
      max-width: 1200px;
      margin: auto;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 28px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      color: #1e3c72;
      text-decoration: none;
    }

    .logo span {
      color: #ff5722;
    }

    nav {
      display: flex;
      gap: 30px;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      font-weight: 600;
      color: #334155;
      transition: 0.3s;
    }

    nav a:hover {
      color: #ff5722;
    }

    .menu-toggle {
      display: none;
      font-size: 28px;
      cursor: pointer;
      color: #1e3c72;
    }

    .hero {
      padding: 160px 20px 140px;
      text-align: center;
      background: linear-gradient(rgba(15,32,67,0.85), rgba(30,60,114,0.85)),
      url('https://images.unsplash.com/photo-1551434678-e076c223a692?auto=format&fit=crop&w=1600&q=80');
      background-size: cover;
      background-position: center;
      color: #fff;
    }

    .hero h1 {
      font-size: 54px;
      font-family: 'Montserrat', sans-serif;
      margin-bottom: 25px;
      line-height: 1.2;
    }

    .hero {
      max-width: 750px;
      margin: auto;
      font-size: 18px;
      margin-bottom: 40px;
      color: #e2e8f0;
    }

    .hero-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .hero-btn,
    .hero-btn-secondary {
      display: inline-block;
      padding: 16px 35px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .hero-btn {
      background: #ff5722;
      color: #fff;
    }

    .hero-btn-secondary {
      border: 2px solid #fff;
      color: #fff;
    }

    .hero-btn:hover,
    .hero-btn-secondary:hover {
      transform: translateY(-3px);
    }

    .services-section {
      padding: 90px 20px;
      max-width: 1200px;
      margin: auto;
    }
