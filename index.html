<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakoto Digital Solutions | Masoivoho Ara-kiditaly</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* GENERAL STYLES */
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html{
            scroll-behavior: smooth;
        }

        body{
            font-family: 'Poppins', sans-serif;
            background: #f8fafc;
            color: #334155;
            overflow-x: hidden;
        }

        /* HEADER & NAVIGATION */
        header{
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .header-container{
            max-width: 1200px;
            margin: auto;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo{
            font-size: 28px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            color: #1e3c72;
        }

        .logo span{
            color: #ff5722;
        }

        nav{
            display: flex;
            gap: 30px;
            align-items: center;
        }

        nav a{
            text-decoration: none;
            font-weight: 600;
            color: #334155;
            transition: 0.3s;
        }

        nav a:hover{
            color: #ff5722;
        }

        .dropdown{
            position: relative;
        }

        .dropdown-btn{
            cursor: pointer;
            font-weight: 600;
        }

        .dropdown-content{
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background: #fff;
            min-width: 220px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            padding: 10px 0;
        }

        .dropdown-content a{
            display: block;
            padding: 12px 18px;
        }

        .dropdown:hover .dropdown-content{
            display: block;
        }

        .lang-dropdown{
            position: relative;
        }

        .lang-btn{
            background: #f1f5f9;
            border: none;
            padding: 10px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
        }

        .lang-content{
            display: none;
            position: absolute;
            right: 0;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
        }

        .lang-content a{
            display: block;
            padding: 12px 15px;
            text-decoration: none;
            color: #334155;
        }

        .lang-dropdown:hover .lang-content{
            display: block;
        }

        /* HERO SECTION */
        .hero{
            padding: 130px 20px;
            text-align: center;
            background: linear-gradient(rgba(30,60,114,0.8), rgba(30,60,114,0.8)), url('https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=1600&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            color: #fff;
        }

        .hero h1{
            font-size: 48px;
            font-family: 'Montserrat', sans-serif;
            margin-bottom: 20px;
        }

        .hero p{
            max-width: 700px;
            margin: auto;
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .hero-btn{
            display: inline-block;
            background: #ff5722;
            color: #fff;
            padding: 15px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .hero-btn:hover{
            transform: translateY(-5px);
        }

        /* SERVICES SECTION */
        .services-section{
            padding: 90px 20px;
            max-width: 1200px;
            margin: auto;
        }

        .services-section h2{
            text-align: center;
            font-size: 38px;
            color: #1e3c72;
            margin-bottom: 60px;
            font-family: 'Montserrat', sans-serif;
        }

        .services-container{
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card{
            background: #fff;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            width: 350px;
            transition: 0.3s;
        }

        .card:hover{
            transform: translateY(-8px);
        }

        .card h3{
            margin-bottom: 15px;
            color: #1e3c72;
        }

        .card p{
            color: #64748b;
            margin-bottom: 20px;
        }

        .card a{
            text-decoration: none;
            color: #ff5722;
            font-weight: 600;
        }

        /* SERVICE MODAL */
        .service-modal{
            display: none;
            position: fixed;
            z-index: 99999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .service-modal-content{
            background: #fff;
            max-width: 700px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn{
            from{ opacity: 0; transform: translateY(-20px); }
            to{ opacity: 1; transform: translateY(0); }
        }

        .close-service{
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 32px;
            cursor: pointer;
            color: #ff5722;
        }

        .service-modal-content h2{
            color: #1e3c72;
            margin-bottom: 20px;
            font-size: 32px;
        }

        .service-modal-content p{
            line-height: 1.9;
            margin-bottom: 15px;
            color: #64748b;
        }

        /* BLOG SECTION */
        .custom-blog-section{
            padding: 90px 20px;
            background: #f1f5f9;
        }

        .custom-blog-header{
            text-align: center;
            max-width: 700px;
            margin: 0 auto 50px auto;
        }

        .custom-blog-header h2{
            font-size: 38px;
            color: #1e3c72;
            margin-bottom: 15px;
            font-family: 'Montserrat', sans-serif;
        }

        .custom-blog-header p{
            color: #64748b;
            line-height: 1.8;
        }

        .custom-blog-container{
            max-width: 1200px;
            margin: auto;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .custom-blog-card{
            width: 360px;
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
            transition: 0.3s;
        }

        .custom-blog-card:hover{
            transform: translateY(-8px);
        }

        .custom-blog-card img{
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .custom-blog-content{
            padding: 25px;
        }

        .custom-blog-content h3{
            margin-bottom: 15px;
            color: #1e3c72;
        }

        .custom-blog-content p{
            margin-bottom: 20px;
            color: #64748b;
        }

        .custom-blog-content a{
            display: inline-block;
            background: #ff5722;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
        }

        /* DETAILS SECTION */
        .details-section{
            max-width: 1200px;
            margin: 100px auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 50px;
            flex-wrap: wrap;
        }

        .details-text{
            flex: 1;
            min-width: 300px;
        }

        .details-text h2{
            font-size: 40px;
            margin-bottom: 20px;
            color: #1e3c72;
            font-family: 'Montserrat', sans-serif;
        }

        .details-text p{
            line-height: 1.9;
            margin-bottom: 30px;
            color: #64748b;
        }

        .details-btn{
            display: inline-block;
            padding: 14px 25px;
            background: #1e3c72;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }

        .details-images{
            flex: 1;
            min-width: 300px;
            position: relative;
            height: 450px;
        }

        .img-back{
            position: absolute;
            width: 70%;
            left: 0;
            top: 0;
            border-radius: 15px;
        }

        .img-front{
            position: absolute;
            width: 60%;
            right: 0;
            bottom: 0;
            border-radius: 15px;
            border: 6px solid #fff;
        }

        /* WHATSAPP FLOAT */
        .whatsapp-float{
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 25px;
            right: 25px;
            background: #25d366;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: 0.3s;
        }

        .whatsapp-float:hover{
            transform: scale(1.1);
        }

        /* FOOTER */
        footer{
            background: #111827;
            padding: 70px 20px;
            color: #9ca3af;
            margin-top: 80px;
        }

        .footer-container{
            max-width: 1200px;
            margin: auto;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
        }

        .footer-col{
            flex: 1;
            min-width: 250px;
        }

        .footer-col h3{
            color: #fff;
            margin-bottom: 20px;
        }

        .footer-col p{
            line-height: 1.8;
        }

        .footer-col a{
            color: #ff5722;
            text-decoration: none;
        }

        .menu-toggle{
            display: none;
            font-size: 28px;
            cursor: pointer;
            color: #1e3c72;
        }

        /* RESPONSIVE DESIGN */
        @media(max-width:768px){
            .menu-toggle{
                display: block;
            }

            nav{
                position: absolute
