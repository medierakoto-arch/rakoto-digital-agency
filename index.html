<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Blog - Rakoto Digital</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
        .blog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .blog-card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; cursor: pointer; transition: transform 0.3s; }
        .blog-card:hover { transform: translateY(-5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .blog-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; }
        .blog-category { background: #4F46E5; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; display: inline-block; margin: 10px 0; }
        .blog-card h3 { margin: 10px 0; color: #1e293b; }
        .read-more { color: #4F46E5; font-weight: bold; text-decoration: none; }
        .page { display: none; }
        .page.active { display: block; }
        .back-btn { background: #4F46E5; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .article-content { line-height: 1.8; font-size: 16px; }
        .article-content img { max-width: 100%; height: auto; border-radius: 8px; margin: 20px 0; }
        .article-content h2 { color: #4F46E5; margin: 30px 0 15px; }
    </style>
</head>
<body>

    <div id="blogPage" class="page active">
        <h1>Nos Articles</h1>
        <div class="blog-grid" id="blogGrid"></div>
    </div>

    <div id="articlePage" class="page">
        <button class="back-btn" onclick="showBlog()">← Retour</button>
        <article id="articleContent"></article>
    </div>

    <script>
        const blogArticles = {
            'seo-madagascar': {
                category: 'SEO & Référencement',
                title: 'SEO Madagascar 2026: Comment Apparaître en 1ère Page de Google',
                date: '7 Juin 2026',
                image: 'https://images.unsplash.com/photo-1432888622747-4eb9a8f2c293?w=800',
                content: `
                    <h1>SEO Madagascar 2026: Guide Complet</h1>
                    <img src="https://images.unsplash.com/photo-1432888622747-4eb9a8f2c293?w=900" alt="SEO">
                    
                    <h2>Introduction</h2>
                    <p>Le SEO (Search Engine Optimization) est LA méthode pour apparaître gratuitement sur Google et attirer des clients qualifiés sans payer de publicité.</p>
                    
                    <h2>Pourquoi le SEO est crucial à Madagascar?</h2>
                    <ul>
                        <li>93% des expériences en ligne commencent par un moteur de recherche</li>
                        <li>75% des utilisateurs ne dépassent jamais la première page</li>
                        <li>Le trafic SEO est gratuit</li>
                        <li>Les résultats sont durables</li>
                    </ul>
                    
                    <h2>Étape 1: Recherche de Mots-clés</h2>
                    <p>La première étape pour optimiser votre site est d'identifier les mots-clés que vos clients potentiels utilisent pour rechercher vos produits ou services.</p>
                    
                    <h3>Outils recommandés:</h3>
                    <ul>
                        <li><strong>Google Keyword Planner</strong> - Gratuit</li>
                        <li><strong>Ubersuggest</strong> - Version gratuite disponible</li>
                        <li><strong>Ahrefs</strong> - Payant mais très complet</li>
                    </ul>
                    
                    <h2>Étape 2: Optimisation On-Page</h2>
                    <p>L'optimisation on-page concerne tous les éléments que vous pouvez contrôler directement sur votre site web.</p>
                    
                    <h3>Éléments importants:</h3>
                    <ol>
                        <li><strong>Balise Title</strong>: 50-60 caractères maximum</li>
                        <li><strong>Meta Description</strong>: 150-160 caractères</li>
                        <li><strong>URL optimisée</strong>: courte et descriptive</li>
                        <li><strong>Structure H1, H2, H3</strong>: hiérarchie claire</li>
                        <li><strong>Contenu de qualité</strong>: minimum 1000 mots</li>
                        <li><strong>Images optimisées</strong>: balises alt descriptives</li>
                    </ol>
                    
                    <h2>Étape 3: Contenu de Qualité</h2>
                    <p>Google privilégie le contenu utile, original et bien structuré. Voici comment créer du contenu qui plaît à Google et à vos lecteurs:</p>
                    
                    <ul>
                        <li>Répondez aux questions de vos clients</li>
                        <li>Utilisez un langage clair et accessible</li>
                        <li>Ajoutez des images et vidéos</li>
                        <li>Mettez à jour régulièrement votre contenu</li>
                        <li>Créez du contenu plus complet que vos concurrents</li>
                    </ul>
                    
                    <h2>Étape 4: Vitesse de Chargement</h2>
                    <p>Un site lent fait fuir les visiteurs et pénalise votre référencement. Objectif: moins de 3 secondes!</p>
                    
                    <h3>Comment améliorer la vitesse:</h3>
                    <ul>
                        <li>Compressez les images (TinyPNG, Squoosh)</li>
                        <li>Utilisez un hébergement de qualité</li>
                        <li>Activez la mise en cache</li>
                        <li>Minifiez les fichiers CSS et JavaScript</li>
                        <li>Utilisez un CDN (Content Delivery Network)</li>
                    </ul>
                    
                    <h2>Étape 5: Mobile Friendly</h2>
                    <p>À Madagascar, plus de 80% des utilisateurs accèdent à Internet via mobile. Google utilise désormais le "mobile-first indexing".</p>
                    
                    <h2>Étape 6: Backlinks (Liens Externes)</h2>
                    <p>Les backlinks sont des liens provenant d'autres sites vers le vôtre. C'est un facteur de ranking très important.</p>
                    
                    <h3>Comment obtenir des backlinks:</h3>
                    <ul>
                        <li>Créez du contenu de qualité que les autres veulent partager</li>
                        <li>Participez à des forums et blogs de votre secteur</li>
                        <li>Collaborez avec d'autres sites</li>
                        <li>Créez des infographies partageables</li>
                        <li>Faites du guest blogging</li>
                    </ul>
                    
                    <h2>Étape 7: Google My Business</h2>
                    <p>Pour les entreprises locales à Madagascar, Google My Business est essentiel pour apparaître dans les résultats locaux.</p>
                    
                    <h2>Suivi et Analyse</h2>
                    <p>Utilisez Google Analytics et Google Search Console pour suivre vos performances et ajuster votre stratégie.</p>
                    
                    <div style="background: #4F46E5; color: white; padding: 30px; border-radius: 10px; margin: 30px 0; text-align: center;">
                        <h2>Besoin d'aide pour votre SEO?</h2>
                        <p>Nous optimisons votre site pour Google à partir de 500€</p>
                        <a href="https://wa.me/261379412593" style="background: white; color: #4F46E5; padding: 15px 30px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 10px; font-weight: bold;">
                            Nous contacter sur WhatsApp
                        </a>
                    </div>
                `
            }
        };

        function showBlog() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('blogPage').classList.add('active');
            
            const grid = document.getElementById('blogGrid');
            grid.innerHTML = Object.entries(blogArticles).map(([key, article]) => `
                <div class="blog-card" onclick="showArticle('${key}')">
                    <img src="${article.image}" alt="${article.title}" onerror="this.src='https://via.placeholder.com/400x200?text=SEO+Madagascar'">
                    <span class="blog-category">${article.category}</span>
                    <h3>${article.title}</h3>
                    <p style="color: #64748b; font-size: 14px;">${article.date}</p>
                    <span class="read-more">Lire la suite →</span>
                </div>
            `).join('');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showArticle(key) {
            const article = blogArticles[key];
            if (!article) return;
            
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            
            document.getElementById('articleContent').innerHTML = `
                ${article.content}
            `;
            
            document.getElementById('articlePage').classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Initialize
        showBlog();
    </script>
</body>
</html>
